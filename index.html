<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Online Sederhana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
            background-color: #fff;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        img {
            width: 100px;
            height: 100px;
            object-fit: cover;
        }
        form {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            margin-top: 15px;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <h1>Toko Online Sederhana</h1>

    <h2>Daftar Produk</h2>
    <table>
        <tr>
            <th>Gambar</th>
            <th>Nama Produk</th>
            <th>Harga</th>
            <th>Deskripsi</th>
        </tr>
        <tr>
            <td>
                <img src="https://image2url.com/r2/default/images/1772685824169-15bfd4b3-4bf4-4cea-b85c-cd28490b0e1e.png" alt="Sepatu Sneakers">
            </td>
            <td>Sepatu Sneakers</td>
            <td>Rp 250.000</td>
            <td>Sepatu nyaman untuk olahraga dan santai.</td>
        </tr>
        <tr>
            <td>
                <img src="https://image2url.com/r2/default/images/1772685796467-30755676-621b-42c1-97ad-8b47eaf07158.png" alt="Tas Ransel">
            </td>
            <td>Tas Ransel</td>
            <td>Rp 150.000</td>
            <td>Tas kuat dan tahan air untuk sekolah/kuliah.</td>
        </tr>
        <tr>
            <td>
                <img src="https://image2url.com/r2/default/images/1772685459683-ac1719c1-1726-4817-9200-3a3984bf001f.png" alt="Jam Tangan">
            </td>
            <td>Jam Tangan</td>
            <td>Rp 300.000</td>
            <td>Jam tangan stylish dengan desain modern.</td>
        </tr>
    </table>

    <h2>Form Pemesanan</h2>
    <form>
        <label>Nama Lengkap:</label>
        <input type="text" name="nama" placeholder="Masukkan nama lengkap" required>

        <label>Pilih Produk:</label>
        <select name="produk">
            <option value="sepatu">Sepatu Sneakers</option>
            <option value="tas">Tas Ransel</option>
            <option value="jam">Jam Tangan</option>
        </select>

        <label>Jumlah:</label>
        <input type="number" name="jumlah" min="1" required>

        <label>Alamat Pengiriman:</label>
        <textarea name="alamat" rows="3" required></textarea>

        <button type="submit">Pesan Sekarang</button>
    </form>

</body>
</html>
